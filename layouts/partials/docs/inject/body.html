<script>
  const loadScript = (url, onloadFunction) => {
    var newScript = document.createElement("script");
    newScript.onerror = (oError) => {
      throw new URIError("The script " + oError.target.src + " didn't load correctly.");
    };
    if (onloadFunction) { newScript.onload = onloadFunction; }
    document.head.insertAdjacentElement('beforeend', newScript);
    newScript.src = url;
  }

  const loadPlantUMLOnNeed = () => {
    let plantumlPrefix = "language-plantuml";

    if (document.querySelectorAll("[class^=" + plantumlPrefix + "]").length > 0) {
      // plantuml-encoder is vendored locally (themes/book/static/); no CDN.
      loadScript('{{ "plantuml-encoder.min.js" | relURL }}', () => {
        // Render through the same-origin PlantUML endpoint so we never reach out
        // to a hardcoded external host. The deployment serves /plantuml/ itself.
        const plantumlBase = location.origin + '/plantuml/svg/~1';
        (function () {
          Array.prototype.forEach.call(document.querySelectorAll("[class^=" + plantumlPrefix + "]"), function (code) {
            let pre = code.parentNode;
            let image = document.createElement("IMG");
            image.loading = 'lazy'; // Lazy loading
            // If /plantuml/ can't be reached (e.g. offline / local dev), fall back
            // to showing the source instead of a broken image.
            image.onerror = function () {
              pre.style.display = '';
              if (image.parentNode) image.parentNode.removeChild(image);
            };
            image.src = plantumlBase + plantumlEncoder.encode(code.innerText);
            pre.parentNode.insertBefore(image, pre);
            pre.style.display = 'none';
          });
        })();

        console.log("PlantUML init done");
      })
    }
  }

  window.addEventListener('load', function (event) {
    // load PlantUML
    loadPlantUMLOnNeed();
  })
</script>

<script>
  (function () {
    var btn = document.getElementById("code-line-toggle");
    if (!btn) return;

    var root = document.documentElement;
    var KEY = "code-line-numbers";

    function shown() {
      return root.classList.contains("code-line-numbers-shown");
    }

    function updateLabel() {
      var label = shown() ? "Hide code line numbers" : "Show code line numbers";
      btn.setAttribute("aria-label", label);
      btn.setAttribute("title", label);
      btn.setAttribute("aria-pressed", shown() ? "true" : "false");
    }

    function apply(nextShown) {
      root.classList.toggle("code-line-numbers-shown", nextShown);
      try {
        if (nextShown) {
          localStorage.setItem(KEY, "shown");
        } else {
          localStorage.removeItem(KEY);
        }
      } catch (e) {}
      updateLabel();
    }

    updateLabel();
    btn.addEventListener("click", function () {
      apply(!shown());
    });
  })();
</script>

<!-- Self-hosted visitor counter (page views / unique visitors / your IP). -->
<script>
  (function () {
    var el = document.getElementById("footer-stats");
    if (!el) return;

    function apiBase() {
      if (window.WIKI_CHECKBOX_API_BASE) {
        return window.WIKI_CHECKBOX_API_BASE.replace(/\/+$/, "");
      }
      var local = ["localhost", "127.0.0.1", "0.0.0.0"].indexOf(location.hostname) !== -1;
      if (local && location.port === "8080") return "/api";
      if (local) return "http://localhost:8000";
      return "/api";
    }

    function num(n) {
      try {
        return Number(n || 0).toLocaleString();
      } catch (e) {
        return String(n || 0);
      }
    }

    // Build each stat with textContent so a forged X-Forwarded-For IP can never
    // inject markup back into the page.
    function stat(label, value) {
      var span = document.createElement("span");
      span.className = "footer-stat";
      span.appendChild(document.createTextNode(label + " "));
      var b = document.createElement("strong");
      b.textContent = value;
      span.appendChild(b);
      return span;
    }

    function render(d) {
      el.textContent = "";
      el.appendChild(stat("Views", num(d.pv)));
      el.appendChild(stat("Visitors", num(d.uv)));
      el.appendChild(stat("Your IP", d.ip || "-"));
      el.hidden = false;
    }

    fetch(apiBase() + "/visit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path: location.pathname }),
    })
      .then(function (r) {
        return r.ok ? r.json() : null;
      })
      .then(function (d) {
        if (d) render(d);
      })
      .catch(function () {});
  })();
</script>

<script>
  // Table of contents: drawer toggle + scroll-spy that follows the current section.
  (function () {
    function initToc() {
      var floatWrap = document.getElementById('toc-float');
      var fab = document.getElementById('toc-fab');
      var panel = document.getElementById('toc-panel');
      var closeBtn = document.getElementById('toc-close');
      if (!floatWrap || !fab || !panel) return;

      // Scope to the visible panel TOC (a hidden duplicate lives in the mobile header).
      var toc = panel.querySelector('#TableOfContents');
      var body = panel.querySelector('.toc-panel-body');
      var links = toc ? Array.prototype.slice.call(toc.querySelectorAll('a[href^="#"]')) : [];
      var root = document.documentElement;
      var mq = window.matchMedia('(min-width: 60rem)');

      // No headings on this page -> nothing to show.
      if (!links.length) {
        floatWrap.style.display = 'none';
        return;
      }

      // --- resize the drawer width (wide screens), persisted across page loads ---
      var TOC_WIDTH_KEY = 'toc.width';
      var resizeHandle = null;

      function pointerX(e) {
        return e.clientX != null ? e.clientX
          : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
      }
      function widthBounds() {
        return { min: 240, max: Math.min(640, Math.round(window.innerWidth * 0.5)) };
      }
      function clampWidth(v) {
        var b = widthBounds();
        return Math.max(b.min, Math.min(b.max, v));
      }
      function applyWidth(px) {
        root.style.setProperty('--toc-width', clampWidth(px) + 'px');
      }
      function currentWidth() {
        return panel.getBoundingClientRect().width || 320;
      }

      try {
        var savedWidth = parseInt(localStorage.getItem(TOC_WIDTH_KEY), 10);
        if (savedWidth) applyWidth(savedWidth);
      } catch (e) {}

      function initResize() {
        var existing = document.querySelector('.toc-resizer');
        if (existing) return existing;

        var handle = document.createElement('div');
        handle.className = 'toc-resizer';
        handle.setAttribute('role', 'separator');
        handle.setAttribute('aria-orientation', 'vertical');
        handle.title = 'Drag to resize \u00b7 double-click to reset';
        document.body.appendChild(handle);

        var dragging = false;
        var dragOffset = 0;

        function onMove(e) {
          if (!dragging) return;
          applyWidth(window.innerWidth - pointerX(e) + dragOffset);
          if (e.cancelable) e.preventDefault();
        }
        function onUp() {
          if (!dragging) return;
          dragging = false;
          handle.classList.remove('dragging');
          document.body.classList.remove('toc-resizing');
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
          var cur = parseInt(getComputedStyle(root).getPropertyValue('--toc-width'), 10);
          try { if (cur) localStorage.setItem(TOC_WIDTH_KEY, cur); } catch (e) {}
        }

        handle.addEventListener('pointerdown', function (e) {
          if (!mq.matches) return;
          dragging = true;
          dragOffset = currentWidth() - (window.innerWidth - pointerX(e));
          handle.classList.add('dragging');
          document.body.classList.add('toc-resizing');
          window.addEventListener('pointermove', onMove);
          window.addEventListener('pointerup', onUp);
          if (e.cancelable) e.preventDefault();
        });

        handle.addEventListener('dblclick', function () {
          root.style.removeProperty('--toc-width');
          try { localStorage.removeItem(TOC_WIDTH_KEY); } catch (e) {}
        });

        return handle;
      }

      resizeHandle = initResize();

      // --- open / close the drawer (state persists across page loads) ---
      var TOC_KEY = 'toc.open';
      function open() {
        floatWrap.classList.add('open');
        document.body.classList.add('toc-open');
        fab.setAttribute('aria-expanded', 'true');
        try { localStorage.setItem(TOC_KEY, '1'); } catch (e) {}
        if (current) scrollPanelTo(current);
      }
      function close() {
        floatWrap.classList.remove('open');
        document.body.classList.remove('toc-open');
        fab.setAttribute('aria-expanded', 'false');
        try { localStorage.setItem(TOC_KEY, '0'); } catch (e) {}
      }
      function toggle() {
        if (floatWrap.classList.contains('open')) { close(); } else { open(); }
      }

      fab.addEventListener('click', function (e) { e.stopPropagation(); toggle(); });
      if (closeBtn) closeBtn.addEventListener('click', function (e) { e.stopPropagation(); close(); });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' || e.keyCode === 27) close();
      });
      document.addEventListener('click', function (e) {
        if (!floatWrap.classList.contains('open')) return;
        if (panel.contains(e.target) || fab.contains(e.target)) return;
        if (resizeHandle && resizeHandle.contains(e.target)) return;
        // Following a link navigates away; keep the drawer's open state so it
        // re-opens on the next page (don't treat it as a dismiss).
        if (e.target.closest && e.target.closest('a')) return;
        // The docked panel reflows content on wide screens, so only dismiss via
        // outside-click on narrow screens where it overlays the page.
        if (window.matchMedia('(min-width: 60rem)').matches) return;
        close();
      });

      // --- scroll-spy ---
      var targets = links.map(function (a) {
        var id = decodeURIComponent((a.getAttribute('href') || '').slice(1));
        return { link: a, el: id ? document.getElementById(id) : null };
      }).filter(function (t) { return t.el; });

      var current = null;

      function scrollPanelTo(link) {
        if (!body || !floatWrap.classList.contains('open')) return;
        var rel = link.getBoundingClientRect().top - body.getBoundingClientRect().top + body.scrollTop;
        body.scrollTo({ top: rel - body.clientHeight / 2, behavior: 'smooth' });
      }

      function setActive(link) {
        if (link === current) return;
        current = link;
        // Reset every item, then light up the active heading + all its parents.
        toc.querySelectorAll('li').forEach(function (li) {
          li.classList.remove('active', 'active-trail');
        });
        links.forEach(function (a) { a.classList.remove('active'); });
        if (link) {
          link.classList.add('active');
          var li = link.closest('li');
          if (li) {
            li.classList.add('active');
            var parent = li.parentElement ? li.parentElement.closest('li') : null;
            while (parent && toc.contains(parent)) {
              parent.classList.add('active-trail');
              parent = parent.parentElement ? parent.parentElement.closest('li') : null;
            }
          }
          scrollPanelTo(link);
        }
      }

      function onScroll() {
        var offset = 100; // a heading counts as "current" once its top passes this line
        var found = null;
        for (var i = 0; i < targets.length; i++) {
          if (targets[i].el.getBoundingClientRect().top <= offset) {
            found = targets[i].link;
          } else {
            break;
          }
        }
        if (!found) found = targets[0].link;
        setActive(found);
      }

      links.forEach(function (a) {
        a.addEventListener('click', function () { setActive(a); });
      });

      var ticking = false;
      window.addEventListener('scroll', function () {
        if (!ticking) {
          ticking = true;
          window.requestAnimationFrame(function () { onScroll(); ticking = false; });
        }
      }, { passive: true });
      window.addEventListener('resize', onScroll, { passive: true });
      onScroll();

      // Keep the drawer open across page navigation if it was open before.
      try {
        if (localStorage.getItem(TOC_KEY) === '1') open();
      } catch (e) {}
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initToc);
    } else {
      initToc();
    }
  })();
</script>

<script>
  // Sidebar: tag the current page and its ancestor folders so the indentation
  // guide lines along the active branch light up (CSS .active / .active-trail).
  (function () {

        parent = parent.parentElement ? parent.parentElement.closest('li') : null;

<script>
  // Sidebar: drag-to-resize its width (wide screens), persisted across page loads.
  // Double-click the handle to reset.
  (function () {
    var KEY = 'sidebar.width';
    var root = document.documentElement;
    var mq = window.matchMedia('(min-width: 60rem)');

    function bounds() {
      return { min: 240, max: Math.min(640, Math.round(window.innerWidth * 0.5)) };
    }
    function clamp(v) { var b = bounds(); return Math.max(b.min, Math.min(b.max, v)); }
    function apply(px) { root.style.setProperty('--sidebar-width', clamp(px) + 'px'); }
    function pointerX(e) {
      return e.clientX != null ? e.clientX
        : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
    }

    // Restore a previously chosen width.
    try {
      var saved = parseInt(localStorage.getItem(KEY), 10);
      if (saved) apply(saved);
    } catch (e) {}

    function init() {
      if (document.querySelector('.menu-resizer')) return;
      var menu = document.querySelector('.book-menu');
      if (!menu) return;

      var handle = document.createElement('div');
      handle.className = 'menu-resizer';
      handle.setAttribute('role', 'separator');
      handle.setAttribute('aria-orientation', 'vertical');
      handle.title = 'Drag to resize \u00b7 double-click to reset';
      document.body.appendChild(handle);

      var dragging = false;
      var dragOffset = 0;

      function onMove(e) {
        if (!dragging) return;
        apply(pointerX(e) + dragOffset);
        if (e.cancelable) e.preventDefault();
      }
      function onUp() {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.classList.remove('sidebar-resizing');
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onUp);
        var cur = parseInt(getComputedStyle(root).getPropertyValue('--sidebar-width'), 10);
        try { if (cur) localStorage.setItem(KEY, cur); } catch (e) {}
      }

      handle.addEventListener('pointerdown', function (e) {
        if (!mq.matches) return;
        if (document.body.classList.contains('sidebar-hidden')) return;
        dragging = true;
        dragOffset = menu.getBoundingClientRect().width - pointerX(e);
        handle.classList.add('dragging');
        document.body.classList.add('sidebar-resizing');
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        if (e.cancelable) e.preventDefault();
      });

      // Double-click restores the default width.
      handle.addEventListener('dblclick', function () {
        root.style.removeProperty('--sidebar-width');
        try { localStorage.removeItem(KEY); } catch (e) {}
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>

<script>
  (function () {
    function checkboxApiBase() {
      if (window.WIKI_CHECKBOX_API_BASE) {
        return window.WIKI_CHECKBOX_API_BASE.replace(/\/+$/, "");
      }
      if (["localhost", "127.0.0.1", "0.0.0.0"].indexOf(location.hostname) !== -1 && location.port === "8080") {
        return "/api";
      }
      if (["localhost", "127.0.0.1", "0.0.0.0"].indexOf(location.hostname) !== -1) {
        return "http://localhost:8000";
      }
      return "/api";
    }

    document.addEventListener("DOMContentLoaded", function () {
      var checkboxes = Array.prototype.slice.call(
        document.querySelectorAll(".markdown li input[type='checkbox']")
      );

      checkboxes.forEach(function (checkbox, index) {
        checkbox.disabled = false;
        checkbox.addEventListener("change", function () {
          var previous = !checkbox.checked;
          checkbox.disabled = true;

          fetch(checkboxApiBase() + "/update-checkbox", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              path: window.location.pathname,
              index: index,
              checked: checkbox.checked
            })
          }).then(function (response) {
            if (!response.ok) throw new Error("Could not update checkbox");
            return response.json();
          }).catch(function (error) {
            checkbox.checked = previous;
            console.error(error);
          }).finally(function () {
            checkbox.disabled = false;
          });
        });
      });
    });
  })();
</script>

<script>
  (function () {
    var btn = document.getElementById("panel-style-toggle");
    if (!btn) return;

    var body = document.body;
    var KEY = "panel-style";
    var COMPACT = "book-panel-compact";
    var GLASS = "book-panel-liquid-glass";

    function isGlass() {
      return body.classList.contains(GLASS);
    }

    function updateLabel() {
      var label = isGlass() ? "Switch to compact panels" : "Switch to liquid glass panels";
      btn.setAttribute("aria-label", label);
      btn.setAttribute("title", label);
      btn.setAttribute("aria-pressed", isGlass() ? "true" : "false");

<!-- Account controls + per-user nav gating. Page/API access is enforced
     server-side by the Go backend front door; this script only hides menu
     entries the current user can't open and adds a Sign in / Sign out control
     plus an Admin link for admins. Page HTML is shared across users, so the
     per-user bits are resolved client-side from GET /api/auth/nav. -->
<script>
  (function () {
    var API = "/api";

    function hideAnchor(a) {
      var li = a.closest ? a.closest("li") : null;
      (li || a).style.display = "none";
    }

    fetch(API + "/auth/nav", { credentials: "same-origin" })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (nav) {
        if (!nav) return;
        var sections = nav.sections || {};
        var menu = document.querySelector(".book-menu nav");
        var anchors = menu ? Array.prototype.slice.call(menu.querySelectorAll("a")) : [];

        // 1. Hide section nav entries the user can't access.
        var rules = [
          { key: "blog", test: function (a) { return a.pathname.indexOf("/posts") === 0; } },
          { key: "kanban", test: function (a) { return a.pathname.indexOf("/kanban") === 0; } },
          { key: "mindmap", test: function (a) { return a.pathname.indexOf("/mindmap") === 0; } },
          { key: "whiteboard", test: function (a) { return a.pathname.indexOf("/whiteboard") === 0; } },
          { key: "directory", test: function (a) { return /(^|\/)~|directory/i.test(a.getAttribute("href") || ""); } },
          { key: "edit", test: function (a) { return /vscode/i.test(a.getAttribute("href") || ""); } }
        ];
        anchors.forEach(function (a) {
          rules.forEach(function (rule) {
            if (sections[rule.key] === false && rule.test(a)) hideAnchor(a);
          });
        });

        // 2. Hide restricted wiki folders from the sidebar file tree.
        var hidden = nav.hidden || [];
        if (hidden.length) {
          anchors.forEach(function (a) {
            var p = (a.pathname || "").toLowerCase();
            for (var i = 0; i < hidden.length; i++) {
              if (p === hidden[i] || p.indexOf(hidden[i] + "/") === 0) { hideAnchor(a); break; }
            }
          });
        }

        // 3. Hide the "Edit this page" link when the editor section is closed.
        if (sections.editor === false) {
          Array.prototype.forEach.call(document.querySelectorAll(".book-edit-online"), function (a) {
            var box = a.closest ? a.closest("div") : null;
            (box || a).style.display = "none";
          });
        }

        // 4. Account control in the sidebar social row (see docs/brand.html):
        //    anonymous -> the user icon links straight to /login; signed-in -> it
        //    opens a small menu with the display name, an Admin link (admins only)
        //    and Sign out.
        var acct = document.getElementById("book-account");
        var acctBtn = document.getElementById("book-account-btn");
        var acctMenu = document.getElementById("book-account-menu");
        if (acct && acctBtn && acctMenu) {
          var returnTo = encodeURIComponent(location.pathname + location.search);

          if (nav.user) {
            acct.classList.add("is-authed");
            acctBtn.setAttribute("aria-label", "Account");
            acctBtn.setAttribute("title", nav.user.display_name || nav.user.username);

            var who = document.createElement("span");
            who.className = "acct-name";
            who.textContent = nav.user.display_name || nav.user.username;
            acctMenu.appendChild(who);

            if (nav.user.is_admin) {
              var adminLink = document.createElement("a");
              adminLink.href = "/admin/";
              adminLink.setAttribute("role", "menuitem");
              adminLink.textContent = "Admin";
              acctMenu.appendChild(adminLink);
            }

            var out = document.createElement("button");
            out.type = "button";
            out.setAttribute("role", "menuitem");
            out.textContent = "Sign out";
            out.addEventListener("click", function () {
              fetch(API + "/auth/logout", { method: "POST", credentials: "same-origin" })
                .then(function () { location.reload(); });
            });
            acctMenu.appendChild(out);

            var closeAcct = function () {
              acct.classList.remove("open");
              acctBtn.setAttribute("aria-expanded", "false");
            };
            acctBtn.addEventListener("click", function (e) {
              e.stopPropagation();
              var open = !acct.classList.contains("open");
              acct.classList.toggle("open", open);
              acctBtn.setAttribute("aria-expanded", open ? "true" : "false");
            });
            acctMenu.addEventListener("click", function (e) { e.stopPropagation(); });
            document.addEventListener("click", function (e) { if (!acct.contains(e.target)) closeAcct(); });
            document.addEventListener("keydown", function (e) { if (e.key === "Escape" || e.keyCode === 27) closeAcct(); });
          } else {
            acctBtn.setAttribute("aria-label", "Sign in");
            acctBtn.setAttribute("title", "Sign in");
            acctBtn.addEventListener("click", function () {
              location.href = "/login/?return=" + returnTo;
            });
          }
          acct.hidden = false;
        }
      })
      .catch(function () {});
  })();
</script>

<!-- Light/dark theme toggle -->
<script>
  (function () {
    var btn = document.getElementById("theme-toggle");
    if (!btn) return;

    function currentTheme() {
      return document.documentElement.getAttribute("data-theme") || "dark";
    }

    function updateLabel(theme) {
      var label = theme === "dark" ? "Switch to light theme" : "Switch to dark theme";
      btn.setAttribute("aria-label", label);
      btn.setAttribute("title", label);
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      try { localStorage.setItem("color-theme", theme); } catch (e) {}
      updateLabel(theme);
    }

    updateLabel(currentTheme());

    btn.addEventListener("click", function () {
      applyTheme(currentTheme() === "dark" ? "light" : "dark");
    });
  })();
</script>
