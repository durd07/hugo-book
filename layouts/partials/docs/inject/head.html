<!-- Apply the saved colour theme before first paint to avoid a flash of the wrong theme. -->
<script>
  (function () {
    try {
      var t = localStorage.getItem("color-theme");
      if (t === "light" || t === "dark") {
        document.documentElement.setAttribute("data-theme", t);
      }
    } catch (e) {}
  })();
</script>
