<center>
<h2 class="book-brand">
  <a class="align-center"
    href="{{ cond (not .Site.Home.File) .Sites.Default.Home.RelPermalink .Site.Home.RelPermalink }}">
    {{- with .Site.Params.BookLogo -}}
    <center><img src="{{ . | relURL }}" alt="Logo" /></center>
    {{- end -}}
  </a>
</h2>
<h2>
    <a class="align-center"
      href="{{ cond (not .Site.Home.File) .Sites.Default.Home.RelPermalink .Site.Home.RelPermalink }}">
      {{ .Site.Title }}
    </a>
    <div class="book-social">
      <a href="mailto: felix.du@nokia-sbell.com"><img src="/images/social/mail.png"></a>
      <a href="https://github.com/durd07"><img src="/images/social/github.png"></a>
      <a href="https://www.facebook.com/durd07/"><img src="/images/social/facebook.png"></a>
      <a href="https://twitter.com/durd07/"><img src="/images/social/twitter.png"></a>
      <!--
      <a href="#" class="fa fa-lg fa-google"></a>
      -->
      <a href="https://www.linkedin.com/in/felix-du-33863a194/"><img src="/images/social/linkedin.png"></a>
      <!--
      <a href="https://github.com/durd07"><img src="/images/social/wechat.png"></a>
      <a href="#" class="fa fa-lg fa-rss"></a>
      -->
      <!-- Account control: a user icon that signs in (anonymous) or opens a small
           menu with the signed-in name, Admin link, and Sign out. Populated and
           revealed client-side from /api/auth/nav (see inject/body.html). -->
      <span class="book-account" id="book-account" hidden>
        <button class="book-account-btn" id="book-account-btn" type="button"
          aria-haspopup="true" aria-expanded="false" aria-label="Sign in" title="Sign in">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="3.6"></circle>
            <path d="M5.5 19.5a6.6 6.6 0 0 1 13 0"></path>
          </svg>
        </button>
        <span class="book-account-menu" id="book-account-menu" role="menu"></span>
      </span>
    </div>
</h2>
</center>
